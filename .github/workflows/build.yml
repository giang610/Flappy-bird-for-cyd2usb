name: Build Flappy Bird CYD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Setup ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "TFT_eSPI"
          arduino-cli lib install "XPT2046_Touchscreen"

      - name: Patch TFT_eSPI User_Setup.h for CYD 2USB
        run: |
          SETUP=$(find /root/Arduino/libraries /home/runner/Arduino/libraries -name "User_Setup.h" -path "*/TFT_eSPI/*" 2>/dev/null | head -1)
          echo "Patching: $SETUP"
          python3 -c "
          content = '''#define USER_SETUP_LOADED
#define ILI9341_DRIVER
#define TFT_WIDTH  240
#define TFT_HEIGHT 320
#define TFT_MISO   12
#define TFT_MOSI   13
#define TFT_SCLK   14
#define TFT_CS     15
#define TFT_DC     27
#define TFT_RST    -1
#define TFT_BL     21
#define TOUCH_CS   33
#define SPI_FREQUENCY        55000000
#define SPI_READ_FREQUENCY   20000000
#define SPI_TOUCH_FREQUENCY   2500000
#define LOAD_GLCD
#define LOAD_FONT2
#define LOAD_FONT4
#define SMOOTH_FONT
'''
import os, sys
path = os.environ.get('SETUP','')
if not path:
    sys.exit('SETUP path not found')
open(path,'w').write(content)
print('Done')
" 

      - name: Build sketch
        run: |
          mkdir -p dist
          arduino-cli compile \
            --fqbn esp32:esp32:esp32:FlashMode=dio,FlashFreq=80,PartitionScheme=min_spiffs \
            --output-dir dist \
            FlappyBird_CYD.ino

      - name: Rename binary
        run: |
          mv dist/FlappyBird_CYD.ino.bin dist/FlappyBird_CYD.bin
          echo "Size: $(wc -c < dist/FlappyBird_CYD.bin) bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlappyBird_CYD_bin
          path: dist/FlappyBird_CYD.bin
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FlappyBird_CYD.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

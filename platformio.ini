; ─────────────────────────────────────────────────────────────────
;  PlatformIO config  –  Flappy Bird CYD 2USB
;  Board   : ESP32 (ILI9341 320x240 + XPT2046)
;  Launcher: bmorcelli/Launcher compatible
; ─────────────────────────────────────────────────────────────────

[env:cyd2usb]
platform      = espressif32
board         = esp32dev
framework     = arduino

; ── Flash / Upload ──────────────────────────────────────────────
board_build.flash_mode  = dio
board_build.f_flash     = 80000000L
board_build.f_cpu       = 240000000L
board_upload.flash_size = 4MB
; min_spiffs: app ~1.9MB | spiffs ~190KB  → tương thích Launcher OTA
board_build.partitions  = min_spiffs.csv

; ── Serial monitor ──────────────────────────────────────────────
monitor_speed = 115200

; ── Libraries ───────────────────────────────────────────────────
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

; ── TFT_eSPI: inject User_Setup via build flags ─────────────────
build_flags =
    -D USER_SETUP_LOADED
    ; ── Driver ──
    -D ILI9341_DRIVER
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    ; ── SPI pins (CYD 2USB) ──
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    ; ── Touch CS ──
    -D TOUCH_CS=33
    ; ── SPI speeds ──
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
    ; ── Fonts ──
    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D SMOOTH_FONT
